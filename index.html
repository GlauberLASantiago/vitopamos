<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Player de Partitura</title>
<script src="https://cdn.jsdelivr.net/npm/opensheetmusicdisplay@1.9.7/build/opensheetmusicdisplay.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/soundfont-player@0.12.0/dist/soundfont-player.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: #f0f2f5; padding: 28px 16px; }
.card { max-width: 880px; margin: 0 auto; background: #fff; border-radius: 18px; box-shadow: 0 4px 32px rgba(0,0,0,.10); overflow: hidden; }
.hd { background: linear-gradient(120deg, #0f0c29, #302b63, #24243e); padding: 22px 28px; display: flex; align-items: center; gap: 16px; }
.hd-icon { width: 46px; height: 46px; background: rgba(255,255,255,.12); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
.hd-title { color: #fff; font-size: 17px; font-weight: 600; }
.hd-sub { color: rgba(255,255,255,.45); font-size: 12px; margin-top: 3px; }
.body { padding: 24px 28px; }

.load-btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: #302b63; color: #fff; border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background .15s; margin-bottom: 6px; }
.load-btn:hover { background: #1a1740; }
.load-btn input { display: none; }
.fname { font-size: 12px; color: #94a3b8; margin-bottom: 12px; min-height: 16px; }

.status { font-size: 12px; font-family: monospace; padding: 7px 12px; border-radius: 7px; margin-bottom: 14px; background: #f8fafc; border-left: 3px solid #e2e8f0; color: #94a3b8; min-height: 34px; line-height: 1.5; }
.status.info { background: #eef2ff; border-color: #6366f1; color: #4338ca; }
.status.ok { background: #f0fdf4; border-color: #22c55e; color: #15803d; }
.status.err { background: #fef2f2; border-color: #ef4444; color: #b91c1c; }

.controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.btn { height: 38px; padding: 0 18px; border: none; border-radius: 9px; cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; }
.btn:disabled { opacity: .3; cursor: default; }
.btn-play { background: #22c55e; color: #fff; }
.btn-play:not(:disabled):hover { background: #16a34a; }
.btn-pause { background: #f59e0b; color: #fff; }
.btn-pause:not(:disabled):hover { background: #d97706; }
.btn-stop { background: #ef4444; color: #fff; }
.btn-stop:not(:disabled):hover { background: #dc2626; }
.btn-export { background: #6366f1; color: #fff; margin-left: auto; }
.btn-export:not(:disabled):hover { background: #4f46e5; }

.bpm-wrap { display: flex; align-items: center; gap: 7px; background: #f1f5f9; border-radius: 9px; padding: 0 14px; height: 38px; }
.bpm-wrap label { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .6px; }
.bpm-wrap input { width: 56px; border: none; background: transparent; font-size: 15px; font-weight: 600; color: #1e293b; text-align: center; font-family: inherit; }
.bpm-wrap input:focus { outline: none; }

#score { overflow-x: auto; }
#score svg { max-width: 100%; height: auto; }
</style>
</head>
<body>

<div class="card">
  <div class="hd">
    <div class="hd-icon">&#127925;</div>
    <div>
      <div class="hd-title">Player de Partitura</div>
      <div class="hd-sub">MusicXML &mdash; General MIDI</div>
    </div>
  </div>

  <div class="body">
    <label class="load-btn">
      <span>&#128193; Carregar partitura</span>
      <input type="file" id="fi" accept=".xml,.musicxml">
    </label>

    <div class="fname" id="fname">Nenhum arquivo selecionado</div>
    <div class="status" id="st">Selecione um arquivo .xml ou .musicxml para começar.</div>

    <div class="controls">
      <button class="btn btn-play" id="bp" disabled>&#9654; Play</button>
      <button class="btn btn-pause" id="bpa" disabled>&#9646;&#9646; Pause</button>
      <button class="btn btn-stop" id="bs" disabled>&#9632; Stop</button>

      <div class="bpm-wrap">
        <label for="bpm">BPM</label>
        <input type="number" id="bpm" value="100" min="20" max="400">
      </div>

      <button class="btn btn-export" id="bx" disabled>&#128203; Copiar HTML</button>
    </div>

    <div id="score"></div>
  </div>
</div>

<script>
(function () {
  var osmd = new opensheetmusicdisplay.OpenSheetMusicDisplay('score', {
    backend: 'svg',
    autoResize: true,
    drawTitle: true
  });

  var inst = null;
  var evs = [];
  var ac = null;
  var sc = [];
  var sat = 0;
  var pat = 0;
  var run = false;
  var rawXml = '';

  function setStatus(msg, cls) {
    var e = document.getElementById('st');
    e.textContent = msg;
    e.className = 'status' + (cls ? ' ' + cls : '');
  }

  function stopScheduled() {
    sc.forEach(function (n) {
      try { n.stop(); } catch (_) {}
    });
    sc = [];
  }

  function extractEvents() {
    evs = [];
    var bpm = +document.getElementById('bpm').value || 100;

    osmd.cursor.reset();
    var iterator = osmd.cursor.Iterator;

    while (!iterator.EndReached) {
      var voices = iterator.CurrentVoiceEntries || [];
      var timeObj = iterator.currentTimeStamp || iterator.CurrentTimeStamp;
      var real = 0;

      if (timeObj) {
        real = typeof timeObj.realValue !== 'undefined'
          ? timeObj.realValue
          : (timeObj.RealValue || 0);
      }

      var tSec = real * 4 * (60 / bpm);

      for (var i = 0; i < voices.length; i++) {
        var ve = voices[i];
        if (!ve || !ve.Notes) continue;

        for (var j = 0; j < ve.Notes.length; j++) {
          var note = ve.Notes[j];
          if (!note || note.isRest()) continue;

          var midi = null;

          if (typeof note.halfTone !== 'undefined' && note.halfTone !== null) {
            midi = note.halfTone + 12;
          } else if (note.Pitch && typeof note.Pitch.getHalfTone === 'function') {
            midi = note.Pitch.getHalfTone();
          } else if (note.TransposedPitch && typeof note.TransposedPitch.getHalfTone === 'function') {
            midi = note.TransposedPitch.getHalfTone();
          }

          if (midi === null) continue;

          var len = 0;
          if (note.Length) {
            len = typeof note.Length.realValue !== 'undefined'
              ? note.Length.realValue
              : (note.Length.RealValue || 0);
          }

          var dur = Math.max(0.08, len * 4 * (60 / bpm) * 0.95);

          evs.push({
            t: tSec,
            midi: midi,
            dur: dur
          });
        }
      }

      iterator.moveToNext();
    }

    evs.sort(function (a, b) {
      if (a.t !== b.t) return a.t - b.t;
      return a.midi - b.midi;
    });
  }

  async function scheduleFrom(offset) {
    extractEvents();

    if (!evs.length) {
      setStatus('Nenhuma nota encontrada para tocar.', 'err');
      return;
    }

    if (ac.state === 'suspended') {
      await ac.resume();
    }

    var now = ac.currentTime + 0.1;
    sat = now - offset;

    evs.forEach(function (ev) {
      if (ev.t < offset - 0.02) return;

      var abs = sat + ev.t;
      if (abs < ac.currentTime) return;

      var n = inst.play(ev.midi, abs, {
        duration: ev.dur,
        gain: 1.0
      });

      if (n) sc.push(n);
    });
  }

  function encodeBase64Unicode(str) {
    return btoa(unescape(encodeURIComponent(str)));
  }

function buildExportHtml(xml, bpm) {
  var xmlBase64 = encodeBase64Unicode(xml);
  var safeBpm = String(bpm).replace(/"/g, '&quot;');

  return `<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Partitura</title>
<script src="https://cdn.jsdelivr.net/npm/opensheetmusicdisplay@1.9.7/build/opensheetmusicdisplay.min.js"><\/script>
<script src="https://cdn.jsdelivr.net/npm/soundfont-player@0.12.0/dist/soundfont-player.min.js"><\/script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: auto; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #fff;
  padding: 0;
  margin: 0;
}
.wrap {
  width: fit-content;
  max-width: 100%;
  margin: 0;
  padding: 0;
}
.controls {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin: 0;
  padding: 0;
}
.andamento-wrap {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: #f1f5f9;
  border-radius: 9px;
  padding: 0 14px;
  height: 38px;
}
.andamento-wrap label {
  font-size: 11px;
  font-weight: 600;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: .6px;
}
.andamento-wrap input {
  width: 56px;
  border: none;
  background: transparent;
  font-size: 15px;
  font-weight: 600;
  color: #1e293b;
  text-align: center;
  font-family: inherit;
}
.andamento-wrap input:focus { outline: none; }

#score {
  overflow-x: auto;
  margin: 0;
  padding: 0;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
}
#score svg {
  display: block;
  max-width: 100%;
  height: auto;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="controls">
    <div class="andamento-wrap">
      <label for="bpm">Andamento</label>
      <input type="number" id="bpm" value="${safeBpm}" min="20" max="400">
    </div>
  </div>
  <div id="score" title="Clique: play/pause | Duplo clique: stop"></div>
</div>

<script>
(function () {
  var RAW = decodeURIComponent(escape(atob("${xmlBase64}")));
  var osmd = new opensheetmusicdisplay.OpenSheetMusicDisplay('score', {
    backend: 'svg',
    autoResize: true,
    drawTitle: false
  });

  var inst = null;
  var evs = [];
  var ac = null;
  var sc = [];
  var sat = 0;
  var pat = 0;
  var run = false;

  function stopScheduled() {
    sc.forEach(function (n) {
      try { n.stop(); } catch (_) {}
    });
    sc = [];
  }

  function extractEvents() {
    evs = [];
    var bpm = +document.getElementById('bpm').value || 100;

    osmd.cursor.reset();
    var iterator = osmd.cursor.Iterator;

    while (!iterator.EndReached) {
      var voices = iterator.CurrentVoiceEntries || [];
      var timeObj = iterator.currentTimeStamp || iterator.CurrentTimeStamp;
      var real = 0;

      if (timeObj) {
        real = typeof timeObj.realValue !== 'undefined'
          ? timeObj.realValue
          : (timeObj.RealValue || 0);
      }

      var tSec = real * 4 * (60 / bpm);

      for (var i = 0; i < voices.length; i++) {
        var ve = voices[i];
        if (!ve || !ve.Notes) continue;

        for (var j = 0; j < ve.Notes.length; j++) {
          var note = ve.Notes[j];
          if (!note || note.isRest()) continue;

          var midi = null;

          if (typeof note.halfTone !== 'undefined' && note.halfTone !== null) {
            midi = note.halfTone + 12;
          } else if (note.Pitch && typeof note.Pitch.getHalfTone === 'function') {
            midi = note.Pitch.getHalfTone();
          } else if (note.TransposedPitch && typeof note.TransposedPitch.getHalfTone === 'function') {
            midi = note.TransposedPitch.getHalfTone();
          }

          if (midi === null) continue;

          var len = 0;
          if (note.Length) {
            len = typeof note.Length.realValue !== 'undefined'
              ? note.Length.realValue
              : (note.Length.RealValue || 0);
          }

          var dur = Math.max(0.08, len * 4 * (60 / bpm) * 0.95);

          evs.push({
            t: tSec,
            midi: midi,
            dur: dur
          });
        }
      }

      iterator.moveToNext();
    }

    evs.sort(function (a, b) {
      if (a.t !== b.t) return a.t - b.t;
      return a.midi - b.midi;
    });
  }

  async function scheduleFrom(offset) {
    extractEvents();
    if (!evs.length) return;

    if (ac.state === 'suspended') {
      await ac.resume();
    }

    var now = ac.currentTime + 0.1;
    sat = now - offset;

    evs.forEach(function (ev) {
      if (ev.t < offset - 0.02) return;

      var abs = sat + ev.t;
      if (abs < ac.currentTime) return;

      var n = inst.play(ev.midi, abs, {
        duration: ev.dur,
        gain: 1.0
      });

      if (n) sc.push(n);
    });
  }

  async function togglePlayPause() {
    if (!inst || !ac) return;

    if (run) {
      run = false;
      pat = ac.currentTime - sat;
      stopScheduled();
      return;
    }

    run = true;
    stopScheduled();
    await scheduleFrom(pat);
    pat = 0;
  }

  function stopPlayback() {
    run = false;
    pat = 0;
    stopScheduled();
  }

  async function init() {
    await osmd.load(RAW);
    osmd.render();

    ac = new (window.AudioContext || window.webkitAudioContext)();
    inst = await Soundfont.instrument(ac, 'acoustic_grand_piano', {
      soundfont: 'FluidR3_GM',
      nameToUrl: function (n, sf) {
        return 'https://gleitz.github.io/midi-js-soundfonts/' + sf + '/' + n + '-mp3.js';
      }
    });
  }

  var scoreEl = document.getElementById('score');

  scoreEl.addEventListener('click', function () {
    clearTimeout(scoreEl._clickTimer);
    scoreEl._clickTimer = setTimeout(function () {
      togglePlayPause();
    }, 220);
  });

  scoreEl.addEventListener('dblclick', function () {
    clearTimeout(scoreEl._clickTimer);
    stopPlayback();
  });

  init();
})();
<\/script>
</body>
</html>`;
}

  document.getElementById('fi').addEventListener('change', async function (e) {
    var f = e.target.files[0];
    if (!f) return;

    document.getElementById('fname').textContent = f.name;
    setStatus('Carregando partitura...', 'info');

    try {
      rawXml = await f.text();

      await osmd.load(rawXml);
      osmd.render();

      setStatus('Carregando piano General MIDI...', 'info');

      if (ac && ac.state !== 'closed') {
        try { await ac.close(); } catch (_) {}
      }

      ac = new (window.AudioContext || window.webkitAudioContext)();
      inst = await Soundfont.instrument(ac, 'acoustic_grand_piano', {
        soundfont: 'FluidR3_GM',
        nameToUrl: function (n, sf) {
          return 'https://gleitz.github.io/midi-js-soundfonts/' + sf + '/' + n + '-mp3.js';
        }
      });

      sat = 0;
      pat = 0;
      run = false;
      evs = [];
      sc = [];

      setStatus('Pronto! Clique em Play.', 'ok');
      ['bp', 'bpa', 'bs', 'bx'].forEach(function (id) {
        document.getElementById(id).disabled = false;
      });
    } catch (err) {
      console.error(err);
      setStatus('Erro: ' + err.message, 'err');
    }
  });

  document.getElementById('bp').onclick = async function () {
    if (run || !inst || !ac) return;
    run = true;
    stopScheduled();
    await scheduleFrom(pat);
    pat = 0;
    setStatus('Tocando...', 'ok');
  };

  document.getElementById('bpa').onclick = function () {
    if (!run || !ac) return;
    run = false;
    pat = ac.currentTime - sat;
    stopScheduled();
    setStatus('Pausado.');
  };

  document.getElementById('bs').onclick = function () {
    run = false;
    pat = 0;
    stopScheduled();
    setStatus('Parado.');
  };

  document.getElementById('bx').onclick = async function () {
    try {
      if (!rawXml) {
        setStatus('Nenhuma partitura carregada para exportar.', 'err');
        return;
      }

      var bpm = document.getElementById('bpm').value || 100;
      var html = buildExportHtml(rawXml, bpm);

      await navigator.clipboard.writeText(html);

      setStatus('HTML copiado para a área de transferência!', 'ok');

      var btn = document.getElementById('bx');
      var old = btn.innerHTML;
      btn.innerHTML = '✓ Copiado!';
      setTimeout(function () {
        btn.innerHTML = old;
      }, 2000);
    } catch (err) {
      console.error(err);
      setStatus('Erro ao copiar HTML: ' + err.message, 'err');
    }
  };
})();
</script>
</body>
</html>
