body { font-family: 'DM Sans', sans-serif; background: #f0f2f5; padding: 28px 16px; }
.card { max-width: 1080px; margin: 0 auto; background: #fff; border-radius: 18px; box-shadow: 0 4px 32px rgba(0,0,0,.10); overflow: hidden; }
.hd { background: linear-gradient(120deg, #0f0c29, #302b63, #24243e); padding: 22px 28px; display: flex; align-items: center; gap: 16px; }
.hd-icon { width: 46px; height: 46px; background: rgba(255,255,255,.12); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
.hd-title { color: #fff; font-size: 17px; font-weight: 600; }
.hd-sub { color: rgba(255,255,255,.45); font-size: 12px; margin-top: 3px; }
.body { padding: 24px 28px; }

.load-btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: #302b63; color: #fff; border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background .15s; margin-bottom: 6px; }
.load-btn:hover { background: #1a1740; }
.load-btn input { display: none; }
.fname { font-size: 12px; color: #94a3b8; margin-bottom: 12px; min-height: 16px; }

.status { font-size: 12px; font-family: monospace; padding: 7px 12px; border-radius: 7px; margin-bottom: 14px; background: #f8fafc; border-left: 3px solid #e2e8f0; color: #94a3b8; min-height: 34px; line-height: 1.5; }
.status.info { background: #eef2ff; border-color: #6366f1; color: #4338ca; }
.status.ok { background: #f0fdf4; border-color: #22c55e; color: #15803d; }
.status.err { background: #fef2f2; border-color: #ef4444; color: #b91c1c; }

.controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.btn { height: 38px; padding: 0 18px; border: none; border-radius: 9px; cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; }
.btn:disabled { opacity: .3; cursor: default; }
.btn-play { background: #22c55e; color: #fff; }
.btn-play:not(:disabled):hover { background: #16a34a; }
.btn-pause { background: #f59e0b; color: #fff; }
.btn-pause:not(:disabled):hover { background: #d97706; }
.btn-stop { background: #ef4444; color: #fff; }
.btn-stop:not(:disabled):hover { background: #dc2626; }
.btn-export { background: #6366f1; color: #fff; margin-left: auto; }
.btn-export:not(:disabled):hover { background: #4f46e5; }

.bpm-wrap,
.inst-wrap,
.rev-wrap {
  display: flex;
  align-items: center;
  gap: 7px;
  background: #f1f5f9;
  border-radius: 9px;
  padding: 0 14px;
  height: 38px;
}
.bpm-wrap label,
.inst-wrap label,
.rev-wrap label {
  font-size: 11px;
  font-weight: 600;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: .6px;
}

.rev-wrap input {
  width: 64px;
  border: none;
  background: transparent;
  font-size: 15px;
  font-weight: 600;
  color: #1e293b;
  text-align: center;
  font-family: inherit;
}
.inst-wrap select {
  min-width: 180px;
  border: none;
  background: transparent;
  font-size: 14px;
  font-weight: 600;
  color: #1e293b;
  font-family: inherit;
}
.bpm-wrap input:focus,
.rev-wrap input:focus,
.inst-wrap select:focus { outline: none; }

#score { overflow-x: auto; }
#score svg { max-width: 100%; height: auto; }
</style>
</head>
<body>

<div class="card">

        <input type="number" id="reverbAmt" value="25" min="0" max="100">

</div>

<script>
(function () {
  var INSTRUMENTS = {
    acoustic_grand_piano: 'Piano normal',
    electric_piano_1: 'Piano elétrico Rhodes',
    drawbar_organ: 'Órgão',
    acoustic_guitar_nylon: 'Violão nylon',
    electric_bass_finger: 'Contrabaixo elétrico',
    marimba: 'Marimba',
    flute: 'Flauta',
    oboe: 'Oboé',
    clarinet: 'Clarineta',
    french_horn: 'Trompa',
    string_ensemble_1: 'Cordas'
  };

  var osmd = new opensheetmusicdisplay.OpenSheetMusicDisplay('score', {
    backend: 'svg',
    autoResize: true,
    drawTitle: true,
    followCursor: false
  });

  var inst = null;
  var evs = [];
  var ac = null;
  var sc = [];
  var sat = 0;
  var pat = 0;
  var run = false;
  var rawXml = '';

  var cursorTimer = null;
  var cursorSteps = [];
  var cursorIndex = 0;

  var inputGain = null;
  var masterGain = null;
  var dryGain = null;
  var wetGain = null;
  var convolver = null;

  function setStatus(msg, cls) {
    var e = document.getElementById('st');
    e.textContent = msg;
    e.className = 'status' + (cls ? ' ' + cls : '');
  }

  function getSelectedInstrument() {
    return document.getElementById('instSel').value || 'acoustic_grand_piano';
  }

  function getReverbAmount() {
    var v = +document.getElementById('reverbAmt').value;
    if (isNaN(v)) v = 25;
    return Math.max(0, Math.min(100, v));
  }

  function createImpulseResponse(audioContext, seconds, decay) {
    var rate = audioContext.sampleRate;
    var length = rate * seconds;
    var impulse = audioContext.createBuffer(2, length, rate);

    for (var c = 0; c < 2; c++) {
      var ch = impulse.getChannelData(c);
      for (var i = 0; i < length; i++) {
        ch[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, decay);
      }
    }
    return impulse;
  }

  function setupFx() {
    if (!ac) return;

    inputGain = ac.createGain();
    masterGain = ac.createGain();
    dryGain = ac.createGain();
    wetGain = ac.createGain();
    convolver = ac.createConvolver();

    convolver.buffer = createImpulseResponse(ac, 2.8, 3.2);

    inputGain.connect(dryGain);
    inputGain.connect(convolver);
    convolver.connect(wetGain);
    dryGain.connect(masterGain);
    wetGain.connect(masterGain);
    masterGain.connect(ac.destination);

    masterGain.gain.value = 1.0;
    updateReverb();
  }

  function updateReverb() {
    if (!dryGain || !wetGain) return;
    var amt = getReverbAmount() / 100;
    dryGain.gain.value = 1 - (amt * 0.45);
    wetGain.gain.value = amt * 1.35;
  }

  async function loadInstrument(programName) {
    if (!ac || ac.state === 'closed') {
      ac = new (window.AudioContext || window.webkitAudioContext)();
      setupFx();
    }

    stopScheduled();

    setStatus('Carregando timbre: ' + (INSTRUMENTS[programName] || programName) + '...', 'info');

    inst = await Soundfont.instrument(ac, programName, {
      soundfont: 'FluidR3_GM',
      destination: inputGain,
      nameToUrl: function (n, sf) {
        return 'https://gleitz.github.io/midi-js-soundfonts/' + sf + '/' + n + '-mp3.js';
      }
    });

    updateReverb();
    setStatus('Pronto! Clique em Play.', 'ok');
  }

  function stopScheduled() {
    sc.forEach(function (n) {
      try { n.stop(); } catch (_) {}
    });
    sc = [];
  }

  function clearCursorTimer() {
    if (cursorTimer) {
      clearTimeout(cursorTimer);
      cursorTimer = null;
    }
  }

  function resetCursorToStart() {
    clearCursorTimer();

    if (!osmd || !osmd.cursor) return;

    try {
      osmd.cursor.hide();
      osmd.cursor.reset();
      osmd.cursor.show();
      cursorIndex = 0;
    } catch (_) {}
  }

  function extractCursorSteps() {
    cursorSteps = [];
    var bpm = +document.getElementById('bpm').value || 100;

    if (!osmd || !osmd.cursor) return;

    try {
      osmd.cursor.reset();
      var iterator = osmd.cursor.Iterator;

      while (!iterator.EndReached) {
        var timeObj = iterator.currentTimeStamp || iterator.CurrentTimeStamp;
        var real = 0;

        if (timeObj) {
          real = typeof timeObj.realValue !== 'undefined'
            ? timeObj.realValue
            : (timeObj.RealValue || 0);
        }

        var tSec = real * 4 * (60 / bpm);

        cursorSteps.push({
          t: tSec
        });

        iterator.moveToNext();
      }
    } catch (_) {}
  }

  function moveCursorToTime(offset) {
    if (!osmd || !osmd.cursor) return;

    extractCursorSteps();

    try {
      osmd.cursor.hide();
      osmd.cursor.reset();
      osmd.cursor.show();

      cursorIndex = 0;

      while (
        cursorIndex + 1 < cursorSteps.length &&
        offset >= cursorSteps[cursorIndex + 1].t - 0.01
      ) {
        try {
          osmd.cursor.next();
          cursorIndex++;
        } catch (_) {
          break;
        }
      }
    } catch (_) {}
  }

  function startCursorFollow(offset) {
    clearCursorTimer();
    moveCursorToTime(offset);

    function step() {
      if (!run || !ac || !osmd || !osmd.cursor || !cursorSteps.length) return;

      var current = ac.currentTime - sat;
      var lookAhead = 0.01;

      while (
        cursorIndex + 1 < cursorSteps.length &&
        current >= cursorSteps[cursorIndex + 1].t - lookAhead
      ) {
        try {
          osmd.cursor.next();
          cursorIndex++;
        } catch (_) {
          break;
        }
      }

      cursorTimer = setTimeout(step, 25);
    }

    step();
  }

  function extractEvents() {
    evs = [];
    var bpm = +document.getElementById('bpm').value || 100;

    osmd.cursor.reset();
    var iterator = osmd.cursor.Iterator;

    while (!iterator.EndReached) {
      var voices = iterator.CurrentVoiceEntries || [];
      var timeObj = iterator.currentTimeStamp || iterator.CurrentTimeStamp;
      var real = 0;

      if (timeObj) {
        real = typeof timeObj.realValue !== 'undefined'
          ? timeObj.realValue
          : (timeObj.RealValue || 0);
      }

      var tSec = real * 4 * (60 / bpm);

      for (var i = 0; i < voices.length; i++) {
        var ve = voices[i];
        if (!ve || !ve.Notes) continue;

        for (var j = 0; j < ve.Notes.length; j++) {
          var note = ve.Notes[j];
          if (!note || note.isRest()) continue;

          var midi = null;

          if (typeof note.halfTone !== 'undefined' && note.halfTone !== null) {
            midi = note.halfTone + 12;
          } else if (note.Pitch && typeof note.Pitch.getHalfTone === 'function') {
            midi = note.Pitch.getHalfTone();
          } else if (note.TransposedPitch && typeof note.TransposedPitch.getHalfTone === 'function') {
            midi = note.TransposedPitch.getHalfTone();
          }

          if (midi === null) continue;

          var len = 0;
          if (note.Length) {
            len = typeof note.Length.realValue !== 'undefined'
              ? note.Length.realValue
              : (note.Length.RealValue || 0);
          }

          var dur = Math.max(0.08, len * 4 * (60 / bpm) * 0.95);

          evs.push({
            t: tSec,
            midi: midi,
            dur: dur
          });
        }
      }

      iterator.moveToNext();
    }

    evs.sort(function (a, b) {
      if (a.t !== b.t) return a.t - b.t;
      return a.midi - b.midi;
    });
  }

  async function scheduleFrom(offset) {
    extractEvents();

    if (!evs.length) {
      setStatus('Nenhuma nota encontrada para tocar.', 'err');
      return;
    }

    if (ac.state === 'suspended') {
      await ac.resume();
    }

    updateReverb();

    var now = ac.currentTime + 0.1;
    sat = now - offset;

    evs.forEach(function (ev) {
      if (ev.t < offset - 0.02) return;

      var abs = sat + ev.t;
      if (abs < ac.currentTime) return;

      var n = inst.play(ev.midi, abs, {
        duration: ev.dur,
        gain: 1.0
      });

      if (n) sc.push(n);
    });
  }

  function encodeBase64Unicode(str) {
    return btoa(unescape(encodeURIComponent(str)));
  }

  function extractTitleFromXml(xml) {
    var m =
      xml.match(/<work-title>([\s\S]*?)<\/work-title>/i) ||
      xml.match(/<movement-title>([\s\S]*?)<\/movement-title>/i) ||
      xml.match(/<credit-words[^>]*>([\s\S]*?)<\/credit-words>/i);

    if (!m) return '';

    return m[1]
      .replace(/<[^>]+>/g, '')
      .replace(/&amp;/g, '&')
      .replace(/&lt;/g, '<')
      .replace(/&gt;/g, '>')
      .replace(/&quot;/g, '"')
      .replace(/&#39;/g, "'")
      .trim();
  }

  function buildExportHtml(xml, bpm, instrumentName, reverbAmount) {
    var xmlBase64 = encodeBase64Unicode(xml);
    var safeBpm = String(bpm).replace(/"/g, '&quot;');
    var safeInstrument = String(instrumentName || 'acoustic_grand_piano').replace(/"/g, '&quot;');
    var safeReverb = String(reverbAmount || 25).replace(/"/g, '&quot;');
    var title = extractTitleFromXml(xml).replace(/\\/g, '\\\\').replace(/"/g, '\\"');
    var titleHtml = title.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    return `<!DOCTYPE html>

        offset >= cursorSteps[cursorIndex + 1].t - 0.01
      ) {
        try {
          osmd.cursor.next();
          cursorIndex++;
        } catch (_) {
          break;
        }
      }
    } catch (_) {}
  }

  function startCursorFollow(offset) {
    clearCursorTimer();
    moveCursorToTime(offset);

    function step() {
      if (!run || !ac || !osmd || !osmd.cursor || !cursorSteps.length) return;

      var current = ac.currentTime - sat;
      var lookAhead = 0.01;

      while (
        cursorIndex + 1 < cursorSteps.length &&
        current >= cursorSteps[cursorIndex + 1].t - lookAhead
      ) {
        try {
          osmd.cursor.next();
          cursorIndex++;
        } catch (_) {
          break;
        }
      }

      cursorTimer = setTimeout(step, 25);
    }

    step();
  }

  async function loadInstrument(programName) {
    if (!ac || ac.state === 'closed') {
      ac = new (window.AudioContext || window.webkitAudioContext)();
      setupFx();
    }

    stopScheduled();

    inst = await Soundfont.instrument(ac, programName, {
      soundfont: 'FluidR3_GM',
      destination: inputGain,
      nameToUrl: function (n, sf) {
        return 'https://gleitz.github.io/midi-js-soundfonts/' + sf + '/' + n + '-mp3.js';
      }
    });

    updateReverb();
  }

  function extractEvents() {
    evs = [];
    var bpm = +document.getElementById('bpm').value || 100;

    osmd.cursor.reset();
    var iterator = osmd.cursor.Iterator;

    while (!iterator.EndReached) {
      var voices = iterator.CurrentVoiceEntries || [];
      var timeObj = iterator.currentTimeStamp || iterator.CurrentTimeStamp;
      var real = 0;

      if (timeObj) {
        real = typeof timeObj.realValue !== 'undefined'
          ? timeObj.realValue
          : (timeObj.RealValue || 0);
      }

      var tSec = real * 4 * (60 / bpm);

      for (var i = 0; i < voices.length; i++) {
        var ve = voices[i];
        if (!ve || !ve.Notes) continue;

        for (var j = 0; j < ve.Notes.length; j++) {
          var note = ve.Notes[j];
          if (!note || note.isRest()) continue;

          var midi = null;

          if (typeof note.halfTone !== 'undefined' && note.halfTone !== null) {
            midi = note.halfTone + 12;
          } else if (note.Pitch && typeof note.Pitch.getHalfTone === 'function') {
            midi = note.Pitch.getHalfTone();
          } else if (note.TransposedPitch && typeof note.TransposedPitch.getHalfTone === 'function') {
            midi = note.TransposedPitch.getHalfTone();
          }

          if (midi === null) continue;

          var len = 0;
          if (note.Length) {
            len = typeof note.Length.realValue !== 'undefined'
              ? note.Length.realValue
              : (note.Length.RealValue || 0);
          }

          var dur = Math.max(0.08, len * 4 * (60 / bpm) * 0.95);

          evs.push({
            t: tSec,
            midi: midi,
            dur: dur
          });
        }
      }

      iterator.moveToNext();
    }

    evs.sort(function (a, b) {
      if (a.t !== b.t) return a.t - b.t;
      return a.midi - b.midi;
    });
  }

  async function scheduleFrom(offset) {
    extractEvents();
    if (!evs.length) return;

    if (ac.state === 'suspended') {
      await ac.resume();
    }

    updateReverb();

    var now = ac.currentTime + 0.1;
    sat = now - offset;

    evs.forEach(function (ev) {
      if (ev.t < offset - 0.02) return;

      var abs = sat + ev.t;
      if (abs < ac.currentTime) return;

      var n = inst.play(ev.midi, abs, {
        duration: ev.dur,
        gain: 1.0
      });

      if (n) sc.push(n);
    });
  }

  async function togglePlayPause() {
    if (!inst || !ac) return;

    if (run) {
      run = false;
      pat = ac.currentTime - sat;
      stopScheduled();
      clearCursorTimer();
      return;
    }

    run = true;
    stopScheduled();
    await scheduleFrom(pat);
    startCursorFollow(pat);
    pat = 0;
  }

  function stopPlayback() {
    run = false;
    pat = 0;
    stopScheduled();
    clearCursorTimer();
    resetCursorToStart();
  }

  async function init() {
    await osmd.load(RAW);
    osmd.render();
    resetCursorToStart();
    extractCursorSteps();

    document.getElementById('instSel').value = "${safeInstrument}";
    await loadInstrument(getSelectedInstrument());
    updateReverb();
  }

  document.getElementById('instSel').addEventListener('change', async function () {
    var wasRunning = run;
    var currentPos = ac && run ? (ac.currentTime - sat) : pat;

    run = false;
    pat = Math.max(0, currentPos);
    clearCursorTimer();
    stopScheduled();

    await loadInstrument(getSelectedInstrument());

    if (wasRunning) {
      run = true;
      await scheduleFrom(pat);
      startCursorFollow(pat);
      pat = 0;
    } else {
      moveCursorToTime(pat);
    }
  });

  document.getElementById('reverbAmt').addEventListener('input', function () {
    updateReverb();
  });

  document.getElementById('bpm').addEventListener('change', function () {
    if (!run) {
      extractCursorSteps();
      moveCursorToTime(pat);
    }
  });

  var scoreEl = document.getElementById('score');

  scoreEl.addEventListener('click', function () {
    clearTimeout(scoreEl._clickTimer);
    scoreEl._clickTimer = setTimeout(function () {
      togglePlayPause();
    }, 220);
  });

  scoreEl.addEventListener('dblclick', function () {
    clearTimeout(scoreEl._clickTimer);
    stopPlayback();
  });

  init();
})();

  document.getElementById('fi').addEventListener('change', async function (e) {

    setStatus('Carregando partitura...', 'info');

    try {

      await osmd.load(rawXml);
      osmd.render();
      resetCursorToStart();
      extractCursorSteps();

      if (ac && ac.state !== 'closed') {
        try { await ac.close(); } catch (_) {}
      }

      ac = new (window.AudioContext || window.webkitAudioContext)();
      setupFx();
      await loadInstrument(getSelectedInstrument());
      updateReverb();

      sat = 0;
      pat = 0;
      run = false;
      evs = [];
      sc = [];

      setStatus('Pronto! Clique em Play.', 'ok');
      ['bp', 'bpa', 'bs', 'bx', 'instSel', 'reverbAmt'].forEach(function (id) {
        document.getElementById(id).disabled = false;
      });
    } catch (err) {
      console.error(err);
      setStatus('Erro: ' + err.message, 'err');
    }
  });

  document.getElementById('instSel').addEventListener('change', async function () {
    if (!rawXml) return;

    var wasRunning = run;
    var currentPos = 0;

    try {
      if (ac && run) {
        currentPos = ac.currentTime - sat;
      } else {
        currentPos = pat;
      }

      run = false;
      pat = Math.max(0, currentPos);
      clearCursorTimer();
      stopScheduled();

      await loadInstrument(getSelectedInstrument());

      if (wasRunning) {
        run = true;
        await scheduleFrom(pat);
        startCursorFollow(pat);
        pat = 0;
        setStatus('Tocando...', 'ok');
      } else {
        moveCursorToTime(pat);
      }
    } catch (err) {

      setStatus('Erro ao trocar timbre: ' + err.message, 'err');
    }
  });

  document.getElementById('reverbAmt').addEventListener('input', function () {
    updateReverb();
  });

  document.getElementById('bpm').addEventListener('change', function () {
    if (!run && rawXml) {

      moveCursorToTime(pat);

  });

  document.getElementById('bp').onclick = async function () {
